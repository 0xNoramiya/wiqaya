<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="shieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#115e59"/>
      <stop offset="100%" stop-color="#0a3d3a"/>
    </linearGradient>
    <linearGradient id="shieldInner" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#c49a20"/>
    </linearGradient>
  </defs>

  <!-- Shield shape -->
  <path d="M64 8 C64 8, 16 20, 16 44 C16 78, 40 106, 64 120 C88 106, 112 78, 112 44 C112 20, 64 8, 64 8 Z"
        fill="url(#shieldGrad)" stroke="#D4AF37" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- Inner shine -->
  <path d="M64 12 C64 12, 20 23, 20 45 C20 76, 42 103, 64 116 C86 103, 108 76, 108 45 C108 23, 64 12, 64 12 Z"
        fill="url(#shieldInner)"/>

  <!-- Open book - left page -->
  <path d="M62 48 L62 88 Q52 84, 36 86 L36 50 Q52 48, 62 48 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>

  <!-- Open book - right page -->
  <path d="M66 48 L66 88 Q76 84, 92 86 L92 50 Q76 48, 66 48 Z"
        fill="none" stroke="url(#goldGrad)" stroke-width="2.5" stroke-linejoin="round" opacity="0.9"/>

  <!-- Book spine -->
  <line x1="64" y1="44" x2="64" y2="90" stroke="#D4AF37" stroke-width="2" opacity="0.7"/>

  <!-- Page lines - left -->
  <line x1="42" y1="58" x2="58" y2="56" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
  <line x1="42" y1="65" x2="58" y2="63" stroke="#D4AF37" stroke-width="1" opacity="0.25"/>
  <line x1="42" y1="72" x2="58" y2="70" stroke="#D4AF37" stroke-width="1" opacity="0.2"/>

  <!-- Page lines - right -->
  <line x1="70" y1="56" x2="86" y2="58" stroke="#D4AF37" stroke-width="1" opacity="0.3"/>
  <line x1="70" y1="63" x2="86" y2="65" stroke="#D4AF37" stroke-width="1" opacity="0.25"/>
  <line x1="70" y1="70" x2="86" y2="72" stroke="#D4AF37" stroke-width="1" opacity="0.2"/>

  <!-- Star/crescent small accent at top -->
  <circle cx="64" cy="34" r="3" fill="#D4AF37" opacity="0.6"/>
</svg>
